<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rdegon SIEM Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: "IBM Plex Sans", sans-serif; color: #d8e7f7; background: radial-gradient(circle at top left, rgba(64, 212, 181, .18), transparent 28%), radial-gradient(circle at bottom right, rgba(88, 166, 255, .15), transparent 26%), linear-gradient(180deg, #081220 0%, #040b14 100%); }
        .card { width: min(420px, calc(100vw - 32px)); padding: 28px; border-radius: 28px; background: rgba(8,17,31,.92); border: 1px solid rgba(111,146,183,.20); box-shadow: 0 30px 80px rgba(0,0,0,.42); }
        h1 { margin: 0 0 10px; font: 700 28px "Space Grotesk", sans-serif; }
        p { margin: 0 0 18px; color: #88a3bf; line-height: 1.5; }
        label { display: block; margin: 12px 0 8px; font-size: 13px; color: #a8bfd8; }
        input { width: 100%; box-sizing: border-box; padding: 13px 14px; border-radius: 14px; border: 1px solid rgba(111,146,183,.20); background: rgba(255,255,255,.03); color: #d8e7f7; }
        button { width: 100%; margin-top: 16px; padding: 13px 14px; border: 1px solid rgba(88,166,255,.22); border-radius: 14px; background: linear-gradient(135deg, rgba(64,212,181,.22), rgba(88,166,255,.18)); color: #eff7ff; font-weight: 600; cursor: pointer; }
        .error { margin-bottom: 14px; padding: 12px 14px; border-radius: 14px; background: rgba(251,113,133,.12); border: 1px solid rgba(251,113,133,.20); color: #ffd5dc; }
        .meta { margin-top: 16px; color: #88a3bf; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Rdegon SIEM</h1>
        <p>Interactive lab console for the 4-VM deployment. Sign in to review dashboards, events, incidents, assets, and resources.</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post" action="/auth/login">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">Sign in</button>
        </form>
        <div class="meta">Base URL: {{ base_url }}</div>
    </div>
</body>
</html>
